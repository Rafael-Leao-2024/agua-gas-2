{% extends "base.html" %}

{% block title %}Novo Pedido - Água & Gás{% endblock %}

{% block content %}
<!-- Cabeçalho simples -->
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('pedidos.lista_pedidos') }}" class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h1 class="h3 mb-0">
        <i class="bi bi-plus-circle me-2 text-primary"></i>
        Novo Pedido
    </h1>
</div>

<!-- Formulário -->
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card">
            <div class="card-body p-3 p-md-4">
                <form method="POST" id="formPedido">
                    <!-- Produto e Volumes (lado a lado) -->
                    <div class="row g-2 g-md-3 mb-3">
                        <div class="col-7">
                            <label class="form-label">Produto</label>
<select class="form-select" name="produto" required>
    
    <option value="" selected disabled>Selecione...</option>

    <!-- ÁGUAS -->
    <optgroup label="💧 Águas">
        <option value="Vidda" class="bg-dark text-light">💧 Vidda</option>
        <option value="Cristalina" class="bg-dark text-light">💧 Cristalina</option>
        <option value="Santa Maria" class="bg-dark text-light">💧 Santa Maria</option>
        <option value="Iaia" class="bg-dark text-light">💧 Iaia</option>
        <option value="Crystal Tropical" class="bg-dark text-light">💧 Crystal Tropical</option>
        <option value="Santa Joana" class="bg-dark text-light">💧 Santa Joana</option>
    </optgroup>

    <!-- GÁS -->
    <optgroup label="🔥 Gás">
        <option value="BrasilGas" class="bg-dark text-light">🔥 BrasilGas</option>
    </optgroup>

</select>
                        </div>
                        <div class="col-5">
                            <label class="form-label small text-muted">Volumes</label>
                            <input type="number" class="form-control" name="volumes" min="1" value="1" required>
                        </div>
                    </div>

                    <!-- Cliente -->
                    <div style="position: relative;">
                        <input type="text"
                            id="nome_cliente"
                            name="nome_cliente"
                            class="form-control"
                            autocomplete="off"
                            placeholder="Ex: João Silva">

                        <div id="sugestoes"
                            class="list-group"
                            style="position:absolute; width:100%; z-index:1000;"></div>
                    </div>

                    <!-- Endereço -->
                    <div style="position: relative;">
                        <label class="form-label small text-muted">Endereço de Entrega</label>

                        <input type="text"
                            id="endereco_cliente"
                            name="endereco_cliente"
                            class="form-control"
                            autocomplete="off"
                            placeholder="Rua, número, bairro, complemento"
                            required>

                        <div id="sugestoes_endereco"
                            class="list-group"
                            style="position:absolute; width:100%; z-index:1000;"></div>
                    </div>

                    <!-- Valor e Forma Pagamento -->
                    <div class="row g-2 g-md-3 mb-3">
                        <div class="col-5">
                            <label class="form-label small text-muted">Valor (R$)</label>
                            <input type="number" step="0.01" class="form-control" name="valor_total" 
                                   placeholder="0,00" required>
                        </div>
                        <div class="col-7">
                            <label class="form-label small text-muted">Forma Pagamento</label>
                            <select class="form-select" name="forma_pagamento" required>
                                <option value=""  disabled>Selecione...</option>
                                <option value="Dinheiro" class="bg-dark text-light">💵 Dinheiro</option>
                                <option value="Cartão" class="bg-dark text-light">💳 Cartão</option>
                                <option value="PIX" selected class="bg-dark text-light">📱 PIX</option>
                                <option value="Fiado" class="bg-dark text-light">📝 Fiado</option>
                            </select>
                        </div>
                    </div>

                    <!-- Status Pagamento -->
                    <div class="mb-4">
                        <label class="form-label small text-muted">Status do Pagamento</label>
                        <select class="form-select" name="status_pagamento" required>
                            <option value="pendente" selected class="bg-dark text-light">⏳ Pendente</option>
                            <option value="pago" class="bg-dark text-light">✅ Pago</option>
                        </select>
                    </div>

                    <!-- Botões -->
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('pedidos.lista_pedidos') }}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i> Salvar Pedido
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Dica rápida (opcional) -->
        <div class="text-center mt-3">
            <small class="text-muted">
                <i class="bi bi-info-circle me-1"></i>
                Após salvar, você pode compartilhar o pedido via WhatsApp
            </small>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
    /* Reset dos selects para tema dark */
    select.form-select {
        background-color: #1a1a2e !important;
        color: #fff !important;
        border-color: #374151 !important;
    }
    
    select.form-select:focus {
        border-color: #0d6efd !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
    }
    
    /* Estilo das opções */
    select.form-select option {
        background-color: #1a1a2e !important;
        color: #fff !important;
        padding: 12px !important;
    }
    
    /* Hover nas opções */
    select.form-select option:hover {
        background-color: #0d6efd !important;
    }
    
    /* Opção selecionada */
    select.form-select option:checked {
        background: linear-gradient(0deg, #0d6efd 0%, #0d6efd 100%);
        color: white !important;
    }
    
    /* Inputs */
    .form-control {
        background-color: #1a1a2e !important;
        border-color: #374151 !important;
        color: #fff !important;
    }
    
    .form-control:focus {
        background-color: #1f1f3a !important;
        border-color: #0d6efd !important;
        color: #fff !important;
    }
    
    .form-control::placeholder {
        color: #6c757d !important;
        opacity: 0.7;
    }
    
    /* Ajustes mobile */
    @media (max-width: 576px) {
        .card-body {
            padding: 1rem !important;
        }
        
        .btn {
            padding: 0.6rem !important;
        }
        
        /* Aumenta área de toque dos selects */
        select.form-select {
            padding: 0.75rem !important;
            font-size: 16px !important; /* Evita zoom no iOS */
        }
        
        input.form-control {
            padding: 0.75rem !important;
            font-size: 16px !important; /* Evita zoom no iOS */
        }
    }
    
    /* Animações suaves */
    .card {
        animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    /* Botão voltar */
    .btn-outline-secondary {
        border-color: #374151;
    }
    
    .btn-outline-secondary:hover {
        background-color: #374151;
        border-color: #374151;
    }
</style>

<script>
document.getElementById('formPedido').addEventListener('submit', function(e) {
    const btn = document.querySelector('button[type="submit"]');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Salvando...';
    btn.disabled = true;
});
</script>

<script>
const inputEndereco = document.getElementById("endereco_cliente");
const sugestoesEndereco = document.getElementById("sugestoes_endereco");

inputEndereco.addEventListener("input", function () {
    const valor = this.value;

    if (valor.length < 3) {
        sugestoesEndereco.innerHTML = "";
        return;
    }

    fetch(`/pedidos/buscar-enderecos?q=${valor}`)
        .then(response => response.json())
        .then(data => {
            sugestoesEndereco.innerHTML = "";

            console.log(data);

            data.forEach(endereco => {
                const item = document.createElement("a");
                item.classList.add("list-group-item", "list-group-item-action");
                item.textContent = endereco;

                item.addEventListener("click", function () {
                    inputEndereco.value = endereco;
                    sugestoesEndereco.innerHTML = "";
                });

                sugestoesEndereco.appendChild(item);
            });
        });
});



const input = document.getElementById("nome_cliente");
const sugestoesBox = document.getElementById("sugestoes");

input.addEventListener("input", function () {
    const valor = this.value;

    if (valor.length < 2) {
        sugestoesBox.innerHTML = "";
        return;
    }

    fetch(`/pedidos/buscar-clientes?q=${valor}`)
        .then(response => response.json())
        .then(data => {
            sugestoesBox.innerHTML = "";
            data.forEach(nome => {
                const item = document.createElement("a");
                item.classList.add("list-group-item", "list-group-item-action");
                item.textContent = nome;

                item.addEventListener("click", function () {
                    input.value = nome;
                    sugestoesBox.innerHTML = "";
                });

                sugestoesBox.appendChild(item);
            });
        });
});
</script>
{% endblock %}
