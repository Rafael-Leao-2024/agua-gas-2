{% extends "base.html" %}

{% block title %}Pedidos Pendentes - Água & Gás{% endblock %}

{% block content %}
<!-- Cabeçalho -->
<div class="d-flex justify-content-between align-items-center flex-wrap mb-4">
    <h1 class="h3 mb-0">
        <i class="bi bi-hourglass-split text-warning me-2"></i>
        Pedidos Pendentes
    </h1>
    <div class="btn-group">
        <button class="btn btn-sm btn-outline-secondary active" onclick="filtrar('todos')" id="btn-todos">Todos</button>
        <button class="btn btn-sm btn-outline-secondary" onclick="filtrar('hoje')" id="btn-hoje">Hoje</button>
        <button class="btn btn-sm btn-outline-secondary" onclick="filtrar('mes')" id="btn-mes">Mês</button>
    </div>
</div>

<!-- Cards para mobile -->
<div class="d-md-none" id="cards-pendentes"></div>

<!-- Tabela para desktop -->
<div class="d-none d-md-block">
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Código</th>
                        <th>Cliente</th>
                        <th>Produto</th>
                        <th>Vol</th>
                        <th>Valor</th>
                        <th>Forma</th>
                        <th>Data</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tabela-pendentes">
                    <tr>
                        <td colspan="8" class="text-center py-4">
                            <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                            Carregando...
                        </td>
                    </tr>
                </tbody>
                <tfoot class="table-dark">
                    <tr>
                        <td colspan="4" class="text-end"><strong>Total:</strong></td>
                        <td><strong id="total-pendentes">R$ 0,00</strong></td>
                        <td colspan="3"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let filtroAtual = 'todos';

function filtrar(tipo) {
    filtroAtual = tipo;
    
    // Atualiza botões
    document.querySelectorAll('.btn-group .btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.getElementById(`btn-${tipo}`).classList.add('active');
    
    carregarPendentes();
}

function carregarPendentes() {
    fetch(`/financas/api/pedidos-pendentes?filtro=${filtroAtual}`)
        .then(response => response.json())
        .then(pedidos => {
            // Atualiza tabela
            const tbody = document.getElementById('tabela-pendentes');
            const cardsContainer = document.getElementById('cards-pendentes');
            let total = 0;
            
            tbody.innerHTML = '';
            cardsContainer.innerHTML = '';
            
            if (pedidos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4 text-muted">Nenhum pedido pendente</td></tr>';
                cardsContainer.innerHTML = '<div class="text-center py-4 text-muted">Nenhum pedido pendente</div>';
                document.getElementById('total-pendentes').textContent = 'R$ 0,00';
                return;
            }
            
            pedidos.forEach(p => {
                total += p.valor;
                
                // Linha da tabela
                tbody.innerHTML += `
                    <tr>
                        <td><span class="badge bg-secondary">${p.codigo}</span></td>
                        <td>${p.cliente}</td>
                        <td>${p.produto}</td>
                        <td>${p.volumes}</td>
                        <td class="text-warning">R$ ${p.valor.toFixed(2)}</td>
                        <td>${p.forma_pagamento}</td>
                        <td>${p.data}</td>
                        <td>
                            <button class="btn btn-sm btn-success" onclick="marcarPago(${p.id})">
                                <i class="bi bi-check"></i> Pagar
                            </button>
                        </td>
                    </tr>
                `;
                
                // Card mobile
                cardsContainer.innerHTML += `
                    <div class="card mb-2 border-warning">
                        <div class="card-body p-3">
                            <div class="d-flex justify-content-between">
                                <span class="badge bg-secondary">${p.codigo}</span>
                                <span class="text-warning fw-bold">R$ ${p.valor.toFixed(2)}</span>
                            </div>
                            <h6 class="mt-2">${p.cliente}</h6>
                            <small class="text-muted d-block">${p.produto} - ${p.volumes}x</small>
                            <small class="text-muted d-block">${p.forma_pagamento} - ${p.data}</small>
                            <button class="btn btn-sm btn-success w-100 mt-2" onclick="marcarPago(${p.id})">
                                <i class="bi bi-check"></i> Marcar como Pago
                            </button>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('total-pendentes').textContent = `R$ ${total.toFixed(2)}`;
        });
}

function marcarPago(pedidoId) {
    if (confirm('Confirmar pagamento?')) {
        fetch(`/financas/api/marcar-pago/${pedidoId}`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Pedido marcado como pago!');
                    carregarPendentes();
                }
            });
    }
}

document.addEventListener('DOMContentLoaded', () => carregarPendentes());
</script>
{% endblock %}
