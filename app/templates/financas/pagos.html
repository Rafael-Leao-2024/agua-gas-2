{% extends "base.html" %}

{% block title %}Pedidos Pagos - Água & Gás{% endblock %}

{% block content %}
<!-- Cabeçalho -->
<div class="d-flex justify-content-between align-items-center flex-wrap mb-4">
    <h1 class="h3 mb-0">
        <i class="bi bi-check-circle text-success me-2"></i>
        Pedidos Pagos
    </h1>
    <div class="btn-group">
        <button class="btn btn-sm btn-outline-secondary active" onclick="filtrar('todos')" id="btn-todos">Todos</button>
        <button class="btn btn-sm btn-outline-secondary" onclick="filtrar('hoje')" id="btn-hoje">Hoje</button>
        <button class="btn btn-sm btn-outline-secondary" onclick="filtrar('mes')" id="btn-mes">Mês</button>
    </div>
</div>

<!-- Cards para mobile -->
<div class="d-md-none" id="cards-pagos"></div>

<!-- Tabela para desktop -->
<div class="d-none d-md-block">
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Código</th>
                        <th>Cliente</th>
                        <th>Produto</th>
                        <th>Vol</th>
                        <th>Valor</th>
                        <th>Forma</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody id="tabela-pagos">
                    <tr>
                        <td colspan="7" class="text-center py-4">
                            <div class="spinner-border spinner-border-sm text-primary me-2"></div>
                            Carregando...
                        </td>
                    </tr>
                </tbody>
                <tfoot class="table-dark">
                    <tr>
                        <td colspan="4" class="text-end"><strong>Total:</strong></td>
                        <td><strong id="total-pagos">R$ 0,00</strong></td>
                        <td colspan="2"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let filtroAtual = 'todos';

function filtrar(tipo) {
    filtroAtual = tipo;
    
    document.querySelectorAll('.btn-group .btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.getElementById(`btn-${tipo}`).classList.add('active');
    
    carregarPagos();
}

function carregarPagos() {
    fetch(`/financas/api/pedidos-pagos?filtro=${filtroAtual}`)
        .then(response => response.json())
        .then(pedidos => {
            const tbody = document.getElementById('tabela-pagos');
            const cardsContainer = document.getElementById('cards-pagos');
            let total = 0;
            
            tbody.innerHTML = '';
            cardsContainer.innerHTML = '';
            
            if (pedidos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">Nenhum pedido pago</td></tr>';
                cardsContainer.innerHTML = '<div class="text-center py-4 text-muted">Nenhum pedido pago</div>';
                document.getElementById('total-pagos').textContent = 'R$ 0,00';
                return;
            }
            
            pedidos.forEach(p => {
                total += p.valor;
                
                tbody.innerHTML += `
                    <tr>
                        <td><span class="badge bg-secondary">${p.codigo}</span></td>
                        <td>${p.cliente}</td>
                        <td>${p.produto}</td>
                        <td>${p.volumes}</td>
                        <td class="text-success">R$ ${p.valor.toFixed(2)}</td>
                        <td>${p.forma_pagamento}</td>
                        <td>${p.data}</td>
                    </tr>
                `;
                
                cardsContainer.innerHTML += `
                    <div class="card mb-2 border-success">
                        <div class="card-body p-3">
                            <div class="d-flex justify-content-between">
                                <span class="badge bg-secondary">${p.codigo}</span>
                                <span class="text-success fw-bold">R$ ${p.valor.toFixed(2)}</span>
                            </div>
                            <h6 class="mt-2">${p.cliente}</h6>
                            <small class="text-muted d-block">${p.produto} - ${p.volumes}x</small>
                            <small class="text-muted d-block">${p.forma_pagamento} - ${p.data}</small>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('total-pagos').textContent = `R$ ${total.toFixed(2)}`;
        });
}

document.addEventListener('DOMContentLoaded', () => carregarPagos());
</script>
{% endblock %}
